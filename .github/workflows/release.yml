name: release
# Releases are cut by bumping the [package] version in Cargo.toml via a PR.
# When that merge lands on main, this workflow creates the matching vX.Y.Z tag
# and, in the SAME run, builds the binaries and publishes to crates.io.
#
# Tag creation and release run in one workflow on purpose: a tag pushed by the
# GITHUB_TOKEN does NOT trigger a separate `on: push: tags` workflow (GitHub
# suppresses it to avoid recursion), so a split "auto-tag → release-on-tag"
# design silently never releases. Keeping both in one run — triggered by the
# human merge push — sidesteps that entirely.
on:
  push:
    branches: [main]
    paths: ["Cargo.toml"]
  workflow_dispatch: {} # manual re-run (e.g. to (re)ship the current version)

permissions:
  contents: write

jobs:
  prepare:
    name: tag if version is new
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.decide.outputs.version }}
      release: ${{ steps.decide.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: decide
        shell: bash
        run: |
          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            # Tag already exists. Only (re)release on an explicit manual dispatch;
            # an ordinary Cargo.toml edit that didn't bump the version is a no-op.
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Tag $tag exists — manual dispatch, will (re)release."
              echo "release=true" >> "$GITHUB_OUTPUT"
            else
              echo "Tag $tag exists and version is unchanged — nothing to release."
              echo "release=false" >> "$GITHUB_OUTPUT"
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
            echo "Created and pushed $tag."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build ${{ matrix.target }}
    needs: prepare
    if: needs.prepare.outputs.release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (musl)
        if: contains(matrix.target, 'musl')
        uses: taiki-e/install-action@cross
      - name: Build (cross)
        if: contains(matrix.target, 'musl')
        run: cross build --release --target ${{ matrix.target }} --bin meta
      - name: Build (native)
        if: ${{ !contains(matrix.target, 'musl') }}
        run: cargo build --release --target ${{ matrix.target }} --bin meta
      - name: Package + checksum
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/meta"
          out="ai-meta-${{ matrix.target }}"
          # Windows builds produce meta.exe; keep the .exe suffix on the asset so
          # the shim (which appends .exe on Windows) resolves it.
          if [ -f "$bin.exe" ]; then
            bin="$bin.exe"
            out="$out.exe"
          fi
          cp "$bin" "$out"
          if command -v sha256sum >/dev/null; then
            sha256sum "$out" > "$out.sha256"
          else
            shasum -a 256 "$out" > "$out.sha256"
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          # Glob so the Windows leg's .exe assets are matched alongside the
          # bare-binary assets on the other platforms.
          files: |
            ai-meta-${{ matrix.target }}*

  publish-crate:
    name: publish to crates.io
    needs: [prepare, build]
    if: needs.prepare.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify checkout matches the release version
        shell: bash
        run: |
          crate="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$crate" != "${{ needs.prepare.outputs.version }}" ]; then
            echo "::error::checked-out crate version $crate != release ${{ needs.prepare.outputs.version }}"
            exit 1
          fi
          echo "Publishing ai-meta v$crate"
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
