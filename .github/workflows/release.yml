name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross (musl)
        if: contains(matrix.target, 'musl')
        uses: taiki-e/install-action@cross
      - name: Build (cross)
        if: contains(matrix.target, 'musl')
        run: cross build --release --target ${{ matrix.target }} --bin meta
      - name: Build (native)
        if: ${{ !contains(matrix.target, 'musl') }}
        run: cargo build --release --target ${{ matrix.target }} --bin meta
      - name: Package + checksum
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/meta"
          out="ai-meta-${{ matrix.target }}"
          cp "$bin" "$out"
          if command -v sha256sum >/dev/null; then
            sha256sum "$out" > "$out.sha256"
          else
            shasum -a 256 "$out" > "$out.sha256"
          fi
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-meta-${{ matrix.target }}
            ai-meta-${{ matrix.target }}.sha256
