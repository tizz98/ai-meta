name: tag on version bump
# Releases are cut by bumping the [package] version in Cargo.toml via a normal
# PR. When that lands on main, this workflow creates the matching `vX.Y.Z` tag,
# which in turn triggers release.yml (binaries + crates.io publish). Deriving the
# tag from the file — instead of hand-cutting it — makes a tag/version mismatch
# impossible.
on:
  push:
    branches: [main]
    paths: ["Cargo.toml"]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Create tag if the version is new
        shell: bash
        run: |
          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          tag="v$version"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          echo "Created and pushed $tag"
