# .meta/meta.toml — ai-meta managing itself (dogfood).
# Profile defaults are baked into the binary; this file only records identity
# and overrides.

[meta]
schema_version = 1
framework_version = "0.1.0"
profile = "rust"

[project]
title = "ai-meta"
description = "The LLM's missing meta framework — one versioned CLI that scaffolds, lints, and syncs project tooling across repos."

[github]
domains = ["cli", "config", "profile", "rules", "github", "template", "sync", "docs"]

[rules.guards]
# Two built-in Rust guards don't fit this codebase and are turned off here
# (the engine still ships and enforces them for the repos it manages):
#   - no-blocking-in-async: ai-meta is a synchronous CLI. The only async is an
#     isolated `block_on` bridge to octocrab in src/github; every flagged
#     `std::fs` call runs in synchronous code, where blocking IO is correct.
#   - no-panic-in-lib: the genuine non-test uses are `Regex::new(<const>).expect()`
#     on static, test-validated patterns — an accepted idiom (a provably-valid
#     static regex can't be asserted without unwrap/expect/panic/unreachable).
#     The rest are the engine's own multi-line test fixtures (strings holding
#     example `unwrap()`s), which a per-line scanner can't fully exclude.
#     Re-enable if fallible-input unwraps ever appear in real library code.
disabled = ["no-blocking-in-async", "no-panic-in-lib"]

[coverage]
# ai-meta's binary is largely IO/CLI glue; gate the testable core, not the shell.
min = 0

[deps]
doc = "docs/dependencies.md"
allowlist = [
  "clap", "anyhow", "thiserror", "serde", "serde_json", "toml", "toml_edit",
  "regex", "walkdir", "similar", "octocrab", "tokio",
  "tempfile", "assert_cmd", "predicates",
]

[[version.locations]]
path = "Cargo.toml"
anchor = '^version\s*='
