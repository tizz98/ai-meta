# .meta/meta.toml — ai-meta managing itself (dogfood).
# Profile defaults are baked into the binary; this file only records identity
# and overrides.

[meta]
schema_version = 1
framework_version = "0.7.1"
profile = "rust"
# Build + run the in-tree binary in CI instead of the pinned ./meta shim, so
# this repo validates its own meta.toml with the binary that defines the schema
# (lets new config fields be dogfooded without a release first). See issue #21.
self_hosting = true

[project]
title = "ai-meta"
description = "The LLM's missing meta framework — one versioned CLI that scaffolds, lints, and syncs project tooling across repos."

[github]
domains = ["cli", "config", "profile", "rules", "github", "template", "sync", "docs"]

[rules.guards]
# no-blocking-in-async doesn't fit this codebase and is turned off (the engine
# still ships and enforces it for the repos it manages): ai-meta is a synchronous
# CLI; the only async is an isolated `block_on` bridge to octocrab in src/github,
# so every flagged `std::fs` call runs in synchronous code where blocking IO is
# correct.
#
# no-panic-in-lib stays ON. Its only legitimate hits are static-regex compiles
# (`Regex::new(<const>).expect()`), each annotated with an inline
# `// meta-allow: no-panic-in-lib` marker explaining why a compile failure should
# fail fast rather than degrade.
disabled = ["no-blocking-in-async"]

[coverage]
# ai-meta's binary is largely IO/CLI glue; gate the testable core, not the shell.
min = 0

[deps]
doc = "docs/dependencies.md"
allowlist = [
  "clap", "anyhow", "thiserror", "serde", "serde_json", "toml", "toml_edit",
  "regex", "walkdir", "similar", "octocrab", "tokio",
  "tempfile", "assert_cmd", "predicates",
]

[tag]
# CI owns tagging + publish (see .github/workflows/release.yml). `meta tag`
# bumps + commits + pushes the branch, but must NOT create the tag or the
# release workflow no-ops. See docs/releasing.md and issue #17.
mode = "bump-only"

[[version.locations]]
path = "Cargo.toml"
anchor = '^version\s*='
